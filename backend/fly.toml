app = "table-reservation-system"
primary_region = "lhr"  # London Heathrow - closest to UK restaurants

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  PORT = "3001"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
